<!DOCTYPE html>
<html>
<head>
    <title>Match Result</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7fa;
        }

        .card-box {
            max-width: 700px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .score {
            font-size: 24px;
            font-weight: bold;
            color: #4e73df;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card-box text-center">

    <h2 class="mb-4">📊 Job Match Results</h2>

    {% if results %}
        {% for job, score in results.items() %}
            <div class="mb-3">
                <h5>{{ job }}</h5>

                <div class="progress">
                    <div class="progress-bar bg-primary" style="width: {{ score }}%">
                        {{ score }}%
                    </div>
                </div>

                <p class="score mt-2">{{ score }}% Match</p>
            </div>
        {% endfor %}
    {% else %}
        <p>No results found</p>
    {% endif %}

    <a href="/job" class="btn btn-dark mt-3">⬅ Back</a>

</div>

</body>
</html>
