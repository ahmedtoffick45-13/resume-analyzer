<!DOCTYPE html>
<html>
<head>
    <title>Match Result</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(to right, #eef2f3, #dfe9f3);
        }

        .card-box {
            max-width: 800px;
            margin: auto;
            padding: 30px;
            border-radius: 15px;
            background: white;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .score {
            font-size: 40px;
            font-weight: bold;
            color: #4e73df;
        }

        .badge {
            font-size: 14px;
            padding: 8px 12px;
        }

        .progress {
            height: 25px;
            border-radius: 20px;
        }

        .btn-back {
            border-radius: 20px;
            padding: 8px 20px;
        }
    </style>
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card-box text-center">

    <h2 class="mb-3">📊 Resume Match Result</h2>

    <!-- Score -->
    <div class="score">{{ result.score }}%</div>

    <!-- Progress Bar -->
    <div class="progress mt-3 mb-4">
        <div class="progress-bar bg-primary" role="progressbar"
             style="width: {{ result.score }}%">
            {{ result.score }}%
        </div>
    </div>

    <!-- Matched Skills -->
    <h5 class="text-success">✅ Matched Skills</h5>
    <div class="mb-3">
        {% for skill in result.matched %}
            <span class="badge bg-success m-1">{{ skill }}</span>
        {% endfor %}
    </div>

    <!-- Missing Skills -->
    <h5 class="text-danger">❌ Missing Skills</h5>
    <div class="mb-4">
        {% for skill in result.missing %}
            <span class="badge bg-danger m-1">{{ skill }}</span>
        {% endfor %}
    </div>

    <!-- Back Button -->
    <a href="/dashboard" class="btn btn-dark btn-back">⬅ Back</a>

</div>

</body>
</html>
