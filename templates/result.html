<!DOCTYPE html>
<html>
<head>
    <title>Resume Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h2 class="text-primary">📄 Extracted Resume</h2>

    <pre class="bg-light p-3 border rounded">{{ text }}</pre>

    <h2 class="text-success mt-4">🚀 Detected Skills</h2>

    <div>
        {% for skill in skills %}
            <span class="badge bg-success m-1">{{ skill }}</span>
        {% endfor %}
    </div>

    <br><br>
    <a href="/dashboard" class="btn btn-secondary">⬅ Back</a>

</body>
</html>
